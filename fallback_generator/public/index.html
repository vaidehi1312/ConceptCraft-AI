<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConceptCraftAI - 3D Visualizer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a1a;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui-layer {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
      max-width: 400px;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      color: #4DA8DA;
      text-transform: uppercase;
    }

    h3 {
      margin-bottom: 5px;
      font-size: 14px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    p {
      margin-top: 0;
      line-height: 1.5;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      background: #333;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 15px;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      color: #888;
    }
  </style>
  <!-- Import Three.js -->
  <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>

<body>
  <div id="loading">Waiting for coordinates...</div>
  <div id="ui-layer" style="display: none;">
    <h1 id="title">Concept Name</h1>
    <div>
      <div class="badge" id="pattern-badge">Pattern: Unknown</div>
      <div class="badge" id="variant-badge" style="background: #e67e22; display: none; margin-left: 5px;">Variant:
        Unknown</div>
    </div>

    <h3>Introduction</h3>
    <p id="desc-intro">Loading...</p>

    <h3>Layout Logic</h3>
    <p id="desc-logic">Loading...</p>
  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
