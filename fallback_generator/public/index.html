<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConceptCraftAI - 3D Visualizer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a1a;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    canvas { display: block; }

    /* Input Bar */
    #input-bar {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      background: rgba(0,0,0,0.75);
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid #444;
      width: 500px;
    }
    #concept-input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: white;
      font-size: 15px;
      outline: none;
    }
    #concept-input:focus { border-color: #4DA8DA; }
    #submit-btn {
      padding: 10px 20px;
      background: #4DA8DA;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    #submit-btn:hover { background: #007CC7; }
    #submit-btn:disabled { background: #555; cursor: not-allowed; }

    /* Info Panel */
    #ui-layer {
      position: absolute;
      top: 20px;
      left: 20px;
      pointer-events: none;
      max-width: 380px;
      background: rgba(0,0,0,0.75);
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #333;
    }
    h1 { margin-top: 0; font-size: 22px; color: #4DA8DA; text-transform: uppercase; }
    h3 { margin-bottom: 5px; font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    p  { margin-top: 0; line-height: 1.5; font-size: 13px; }
    .badge {
      display: inline-block;
      background: #333;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    /* Status */
    #status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px;
      color: #888;
      text-align: center;
      pointer-events: none;
    }
    #status.error { color: #e74c3c; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #444;
      border-top-color: #4DA8DA;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>

  <!-- Status / Loading -->
  <div id="status">Enter a concept below to visualize it in 3D</div>

  <!-- Info Panel -->
  <div id="ui-layer" style="display:none;">
    <h1 id="title">Concept Name</h1>
    <div>
      <span class="badge" id="pattern-badge">Pattern: Unknown</span>
      <span class="badge" id="variant-badge" style="display:none; background:#e67e22; margin-left:5px;">Variant: Unknown</span>
    </div>
    <h3>Introduction</h3>
    <p id="desc-intro">Loading...</p>
    <h3>Layout Logic</h3>
    <p id="desc-logic">Loading...</p>
  </div>

  <!-- Input Bar -->
  <div id="input-bar">
    <input id="concept-input" type="text" placeholder="e.g. photosynthesis, DNA, solar system..." />
    <button id="submit-btn">Visualize</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
