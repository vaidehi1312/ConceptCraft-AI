<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConceptCraftAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1420;
    --border: #1a2235;
    --accent: #4fffb0;
    --accent2: #00c8ff;
    --muted: #3d5068;
    --text: #e8f0fe;
    --text-dim: #6b84a0;
    --danger: #ff6b6b;
    --warn: #ffb347;
    --card-bg: #0d1622;
    --high: #4fffb0;
    --medium: #00c8ff;
    --low: #ffb347;
    --fallback: #ff6b6b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; opacity: 0.15; }
  .orb-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; right: -100px; }
  .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; }

  .wrap { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 24px; }

  header { padding: 48px 0 0; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; letter-spacing: 0.08em; color: var(--accent); text-transform: uppercase; }
  .logo span { color: var(--text-dim); font-weight: 400; }
  .badge { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px; }

  .hero { padding: 72px 0 48px; text-align: center; }
  .hero-eyebrow { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; opacity: 0; animation: fadeUp 0.6s ease 0.1s forwards; }
  .hero h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(2.4rem, 5vw, 3.6rem); line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 20px; opacity: 0; animation: fadeUp 0.6s ease 0.2s forwards; }
  .hero h1 em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero p { color: var(--text-dim); font-size: 0.9rem; line-height: 1.7; max-width: 480px; margin: 0 auto; opacity: 0; animation: fadeUp 0.6s ease 0.3s forwards; }

  .api-config { margin-bottom: 28px; opacity: 0; animation: fadeUp 0.6s ease 0.4s forwards; }
  .api-toggle { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; padding: 0; display: flex; align-items: center; gap: 6px; transition: color 0.15s; }
  .api-toggle:hover { color: var(--accent); }
  .api-panel { display: none; margin-top: 12px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; }
  .api-panel.open { display: block; }
  .api-panel label { font-size: 0.7rem; color: var(--text-dim); display: block; margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
  .api-panel input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.8rem; outline: none; transition: border-color 0.15s; }
  .api-panel input:focus { border-color: var(--accent); }

  .search-wrap { margin: 0 auto 48px; max-width: 640px; opacity: 0; animation: fadeUp 0.6s ease 0.5s forwards; }
  .search-box { display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 4px 4px 4px 20px; gap: 12px; transition: border-color 0.2s, box-shadow 0.2s; }
  .search-box:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,255,176,0.08); }
  .search-box input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.95rem; padding: 12px 0; caret-color: var(--accent); }
  .search-box input::placeholder { color: var(--muted); }
  .search-btn { background: var(--accent); color: #080c10; border: none; border-radius: 4px; padding: 10px 22px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s, transform 0.15s; white-space: nowrap; }
  .search-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .search-btn:active { transform: translateY(0); }
  .search-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .examples { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
  .ex-chip { font-size: 0.72rem; color: var(--text-dim); border: 1px solid var(--border); border-radius: 2px; padding: 4px 12px; cursor: pointer; transition: all 0.15s; background: none; font-family: 'DM Mono', monospace; }
  .ex-chip:hover { color: var(--accent); border-color: var(--accent); background: rgba(79,255,176,0.04); }

  .status-bar { display: none; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 28px; font-size: 0.75rem; color: var(--text-dim); }
  .status-bar.show { display: flex; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .status-dot.loading { animation: pulse 1s ease infinite; }
  .status-domain { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .domain-tag { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 2px; background: rgba(79,255,176,0.08); color: var(--accent); border: 1px solid rgba(79,255,176,0.2); }

  /* ── Confidence tier badge ── */
  .tier-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 2px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .tier-badge.high     { background: rgba(79,255,176,0.1);  color: var(--high);     border: 1px solid rgba(79,255,176,0.3); }
  .tier-badge.medium   { background: rgba(0,200,255,0.1);   color: var(--medium);   border: 1px solid rgba(0,200,255,0.3); }
  .tier-badge.low      { background: rgba(255,179,71,0.1);  color: var(--low);      border: 1px solid rgba(255,179,71,0.3); }
  .tier-badge.fallback { background: rgba(255,107,107,0.1); color: var(--fallback); border: 1px solid rgba(255,107,107,0.3); }

  /* ── Explainability box ── */
  .explain-box { display: none; padding: 16px 20px; border-radius: 6px; margin-bottom: 28px; font-size: 0.78rem; line-height: 1.65; border: 1px solid; gap: 14px; align-items: flex-start; }
  .explain-box.show { display: flex; }
  .explain-box.high     { background: rgba(79,255,176,0.04);  border-color: rgba(79,255,176,0.2); }
  .explain-box.medium   { background: rgba(0,200,255,0.04);   border-color: rgba(0,200,255,0.2); }
  .explain-box.low      { background: rgba(255,179,71,0.04);  border-color: rgba(255,179,71,0.2); }
  .explain-box.fallback { background: rgba(255,107,107,0.04); border-color: rgba(255,107,107,0.2); }
  .explain-box .ex-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }
  .explain-box .ex-body strong { display: block; margin-bottom: 4px; font-family: 'Syne', sans-serif; font-size: 0.8rem; letter-spacing: 0.04em; }
  .explain-box .ex-body strong.high     { color: var(--high); }
  .explain-box .ex-body strong.medium   { color: var(--medium); }
  .explain-box .ex-body strong.low      { color: var(--low); }
  .explain-box .ex-body strong.fallback { color: var(--fallback); }
  .explain-box .ex-body span { color: var(--text-dim); }

  .score-row { display: flex; gap: 6px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  .score-pill { font-size: 0.65rem; letter-spacing: 0.08em; padding: 3px 10px; border-radius: 2px; border: 1px solid var(--border); color: var(--text-dim); }

  .best-match-section { display: none; margin-bottom: 40px; }
  .best-match-section.show { display: block; }
  .section-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px; }

  .best-match-card { background: var(--card-bg); border: 1px solid rgba(79,255,176,0.3); border-radius: 8px; overflow: hidden; display: grid; grid-template-columns: 1fr 1fr; }
  @media (max-width: 640px) { .best-match-card { grid-template-columns: 1fr; } }

  .viewer-pane { position: relative; background: #060a0e; min-height: 340px; }
  .viewer-pane iframe { width: 100%; height: 100%; min-height: 340px; border: none; display: block; }
  .viewer-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-dim); }
  .viewer-placeholder img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; opacity: 0.6; }
  .viewer-placeholder .no-viewer-text { position: relative; z-index: 1; text-align: center; font-size: 0.75rem; background: rgba(8,12,16,0.8); padding: 10px 16px; border-radius: 4px; border: 1px solid var(--border); }
  .viewer-open-btn { position: absolute; bottom: 12px; right: 12px; z-index: 10; background: var(--accent); color: #080c10; border: none; border-radius: 3px; padding: 7px 14px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: opacity 0.15s; }
  .viewer-open-btn:hover { opacity: 0.85; }
  .best-badge { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; background: var(--accent); color: #080c10; padding: 3px 8px; border-radius: 2px; font-family: 'Syne', sans-serif; font-weight: 700; }

  .info-pane { padding: 28px 28px 24px; display: flex; flex-direction: column; justify-content: space-between; gap: 20px; }
  .info-source { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px; }
  .info-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; line-height: 1.25; margin-bottom: 10px; color: var(--text); }
  .info-desc { font-size: 0.78rem; color: var(--text-dim); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 14px; }

  .info-scores { display: flex; flex-direction: column; gap: 8px; }
  .score-bar-row { display: flex; align-items: center; gap: 10px; font-size: 0.68rem; color: var(--text-dim); }
  .score-bar-label { width: 60px; flex-shrink: 0; letter-spacing: 0.06em; }
  .score-bar-track { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .score-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.6s ease; }
  .score-bar-fill.blue { background: var(--accent2); }
  .score-bar-fill.muted { background: var(--muted); }
  .score-bar-val { width: 36px; text-align: right; color: var(--text); flex-shrink: 0; }

  .results-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 14px; }
  .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin-bottom: 60px; }

  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: border-color 0.2s, transform 0.2s; opacity: 0; animation: fadeUp 0.4s ease forwards; cursor: pointer; text-decoration: none; display: block; color: inherit; }
  .card:hover { border-color: rgba(79,255,176,0.4); transform: translateY(-3px); }
  .card-thumb { aspect-ratio: 4/3; background: var(--surface); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.3s; }
  .card-thumb img.loaded { opacity: 1; }
  .thumb-placeholder { font-size: 2rem; opacity: 0.15; }
  .card-body { padding: 14px 16px 16px; }
  .card-source { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
  .card-name { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.88rem; line-height: 1.3; margin-bottom: 8px; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-desc { font-size: 0.72rem; color: var(--text-dim); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 10px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-score { font-size: 0.63rem; color: var(--text-dim); }
  .card-score strong { color: var(--accent); font-weight: 400; }
  .card-link { font-size: 0.63rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent2); border-bottom: 1px solid rgba(0,200,255,0.3); padding-bottom: 1px; }

  .empty-state { text-align: center; padding: 60px 0; color: var(--text-dim); display: none; }
  .empty-state.show { display: block; }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 0.8rem; line-height: 1.7; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .card:nth-child(1){animation-delay:0.03s} .card:nth-child(2){animation-delay:0.06s}
  .card:nth-child(3){animation-delay:0.09s} .card:nth-child(4){animation-delay:0.12s}
  .card:nth-child(5){animation-delay:0.15s} .card:nth-child(6){animation-delay:0.18s}
  .card:nth-child(7){animation-delay:0.21s} .card:nth-child(8){animation-delay:0.24s}
  .card:nth-child(9){animation-delay:0.27s} .card:nth-child(10){animation-delay:0.30s}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">

  <header>
    <div class="logo">Concept<span>Craft</span>AI</div>
    <div class="badge">Beta · v4.3</div>
  </header>

  <div class="hero">
    <div class="hero-eyebrow">Science → 3D Model Search</div>
    <h1>Type any concept.<br><em>Find its 3D model.</em></h1>
    <p>Search across 49,000+ biological, chemical, physical and astronomical 3D models using semantic AI search.</p>
  </div>

  <div class="api-config">
    <button class="api-toggle" onclick="toggleApi()">⚙ API endpoint</button>
    <div class="api-panel" id="apiPanel">
      <label>Backend URL</label>
      <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="https://your-ngrok-url.ngrok-free.app" />
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="mitochondria, black hole, glucose, DNA..." autocomplete="off" spellcheck="false" />
      <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
    </div>
    <div class="examples">
      <button class="ex-chip" onclick="setQuery('mitochondria')">mitochondria</button>
      <button class="ex-chip" onclick="setQuery('black hole')">black hole</button>
      <button class="ex-chip" onclick="setQuery('DNA')">DNA</button>
      <button class="ex-chip" onclick="setQuery('glucose')">glucose</button>
      <button class="ex-chip" onclick="setQuery('Newton cradle')">Newton cradle</button>
      <button class="ex-chip" onclick="setQuery('heart')">heart</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Searching...</span>
    <div class="status-domain" id="statusDomain"></div>
  </div>

  <div class="score-row" id="scoreRow" style="display:none"></div>

  <!-- Explainability box — the key new addition -->
  <div class="explain-box" id="explainBox">
    <div class="ex-icon" id="explainIcon"></div>
    <div class="ex-body">
      <strong id="explainTitle"></strong>
      <span id="explainMsg"></span>
    </div>
  </div>

  <div class="best-match-section" id="bestMatchSection">
    <div class="section-label">// best match</div>
    <div class="best-match-card" id="bestMatchCard"></div>
  </div>

  <div id="resultsLabel" class="results-label" style="display:none"></div>
  <div class="results-grid" id="resultsGrid"></div>

  <div class="empty-state" id="emptyState">
    <div class="icon">◎</div>
    <p>No results found.<br>Try a different query or check your API endpoint.</p>
  </div>

</div>

<script>
  const DOMAIN_ICONS = { biological:'🧬', physical:'⚙️', chemical:'⚗️', astronomical:'🔭' };

  // ── Confidence tier definitions ────────────────────────────────────────────
  // Mirrors the tiers in search.py: high ≥0.65, medium ≥0.45, low ≥0.30, fallback <0.30
  const TIER_CONFIG = {
    high: {
      icon: '✦',
      label: 'High Confidence',
      message: 'Strong semantic and structural match. This model closely represents the concept you searched for.',
    },
    medium: {
      icon: '◈',
      label: 'Medium Confidence — Closest Match',
      message: 'Decent match. The model is related to your query but may not be an exact representation. Review the description before use.',
    },
    low: {
      icon: '⚠',
      label: 'Low Confidence — Nearest Available',
      message: 'Weak match. No strong result was found. This is the nearest available model in the dataset — try a more specific search term for better results.',
    },
    fallback: {
      icon: '✕',
      label: 'No Confident Match — Generative Fallback',
      message: 'The retrieval system could not find a relevant 3D model. The fallback generator may produce an approximate representation. Try rephrasing your query.',
    },
  };

  function getApiUrl() {
    return (document.getElementById('apiUrl').value || 'http://localhost:8000').replace(/\/$/, '');
  }
  function toggleApi() { document.getElementById('apiPanel').classList.toggle('open'); }
  function setQuery(q) { document.getElementById('searchInput').value = q; doSearch(); }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    const btn          = document.getElementById('searchBtn');
    const statusBar    = document.getElementById('statusBar');
    const statusDot    = document.getElementById('statusDot');
    const statusText   = document.getElementById('statusText');
    const statusDomain = document.getElementById('statusDomain');
    const scoreRow     = document.getElementById('scoreRow');
    const explainBox   = document.getElementById('explainBox');
    const bestSection  = document.getElementById('bestMatchSection');
    const resultsLabel = document.getElementById('resultsLabel');
    const resultsGrid  = document.getElementById('resultsGrid');
    const emptyState   = document.getElementById('emptyState');

    // Reset
    btn.disabled = true;
    btn.textContent = '...';
    resultsGrid.innerHTML = '';
    document.getElementById('bestMatchCard').innerHTML = '';
    scoreRow.style.display = 'none';
    resultsLabel.style.display = 'none';
    bestSection.classList.remove('show');
    explainBox.className = 'explain-box';
    emptyState.classList.remove('show');
    statusDomain.innerHTML = '';
    statusDot.style.background = 'var(--accent)';
    statusDot.classList.add('loading');
    statusText.textContent = 'Expanding query & searching all domains...';
    statusBar.classList.add('show');

    try {
      const res = await fetch(`${getApiUrl()}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, top_k: 10 })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      // Use new confidence_tier field; fall back gracefully for older API versions
      const tier   = data.confidence_tier || (data.accepted ? 'medium' : 'fallback');
      const domain = data.source_domain   || data.domain || 'unknown';

      // Status bar
      statusDot.classList.remove('loading');
      statusText.textContent = `Found ${data.results.length} result${data.results.length !== 1 ? 's' : ''} · ${domain}`;
      statusDomain.innerHTML = `
        <span class="domain-tag">${DOMAIN_ICONS[domain] || ''} ${domain}</span>
        <span class="tier-badge ${tier}">${TIER_CONFIG[tier]?.icon || ''} ${tier}</span>
      `;

      // Score row
      scoreRow.style.display = 'flex';
      scoreRow.innerHTML = `
        <span class="score-pill">score&nbsp;${data.best_score.toFixed(3)}</span>
        <span class="score-pill">ce&nbsp;${data.clip_score.toFixed(3)}</span>
        <span class="score-pill">struct&nbsp;${data.structural_score.toFixed(3)}</span>
        <span class="score-pill">faiss&nbsp;${data.faiss_score.toFixed(3)}</span>
      `;

      // Explainability box
      const tc = TIER_CONFIG[tier];
      if (tc) {
        document.getElementById('explainIcon').textContent  = tc.icon;
        document.getElementById('explainTitle').textContent = tc.label;
        document.getElementById('explainTitle').className   = tier;
        document.getElementById('explainMsg').textContent   = tc.message;
        explainBox.className = `explain-box ${tier} show`;
      }

      if (!data.results || data.results.length === 0) {
        emptyState.classList.add('show');
        return;
      }

      // Best match card with inline 3D viewer
      renderBestMatch(data.results[0], domain, tier);
      bestSection.classList.add('show');

      // Remaining results as cards
      const rest = data.results.slice(1);
      if (rest.length > 0) {
        resultsLabel.style.display = 'block';
        resultsLabel.textContent = `// ${rest.length} other candidate${rest.length !== 1 ? 's' : ''}`;
        renderCards(rest);
      }

    } catch (err) {
      statusDot.classList.remove('loading');
      statusDot.style.background = 'var(--danger)';
      statusText.textContent = `Error: ${err.message} — check API endpoint above`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Search';
    }
  }

  function renderBestMatch(r, domain, tier) {
    const card   = document.getElementById('bestMatchCard');
    const source = cleanSource(r.source);
    const tc     = TIER_CONFIG[tier] || TIER_CONFIG.medium;

    let viewerHtml = '';
    if (r.embed_url) {
      viewerHtml = `
        <div class="viewer-pane">
          <span class="best-badge">Best match</span>
          <iframe src="${r.embed_url}" allowfullscreen loading="lazy"></iframe>
          <a class="viewer-open-btn" href="${r.embed_url}" target="_blank" rel="noopener">↗ Open full viewer</a>
        </div>`;
    } else if (r.thumbnail) {
      viewerHtml = `
        <div class="viewer-pane">
          <span class="best-badge">Best match</span>
          <div class="viewer-placeholder">
            <img src="${r.thumbnail}" alt="${r.name}" />
            <div class="no-viewer-text">No 3D viewer — thumbnail only</div>
          </div>
        </div>`;
    } else {
      viewerHtml = `
        <div class="viewer-pane">
          <span class="best-badge">Best match</span>
          <div class="viewer-placeholder">
            <div class="no-viewer-text">${DOMAIN_ICONS[domain] || '◎'}<br>No preview available</div>
          </div>
        </div>`;
    }

    const scores = [
      { label: 'Final',  val: r.final_score,      cls: '' },
      { label: 'CE',     val: r.clip_score,        cls: 'blue' },
      { label: 'Struct', val: r.structural_score,  cls: 'muted' },
      { label: 'FAISS',  val: r.faiss_score,       cls: 'muted' },
    ];

    const scoreBarsHtml = scores.map(s => `
      <div class="score-bar-row">
        <span class="score-bar-label">${s.label}</span>
        <div class="score-bar-track">
          <div class="score-bar-fill ${s.cls}" style="width:${Math.min(((s.val||0)*100),100).toFixed(1)}%"></div>
        </div>
        <span class="score-bar-val">${(s.val||0).toFixed(3)}</span>
      </div>`).join('');

    card.innerHTML = `
      ${viewerHtml}
      <div class="info-pane">
        <div>
          <div class="info-source">${source} · ${DOMAIN_ICONS[domain] || ''} ${domain}</div>
          <div class="info-name">${r.name || 'Untitled'}</div>
          ${r.description ? `<div class="info-desc">${r.description}</div>` : ''}
          <span class="tier-badge ${tier}" style="margin-bottom:4px">${tc.icon} ${tier} confidence</span>
        </div>
        <div class="info-scores">${scoreBarsHtml}</div>
      </div>`;
  }

  function renderCards(results) {
    const grid = document.getElementById('resultsGrid');
    grid.innerHTML = '';
    results.forEach(r => {
      const card = document.createElement(r.embed_url ? 'a' : 'div');
      if (r.embed_url) { card.href = r.embed_url; card.target = '_blank'; card.rel = 'noopener'; }
      card.className = 'card';
      const thumb = r.thumbnail || '';
      const thumbHtml = thumb
        ? `<img src="${thumb}" alt="${r.name}" onload="this.classList.add('loaded')" onerror="this.style.display='none'">`
        : `<div class="thumb-placeholder">◎</div>`;
      card.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-source">${cleanSource(r.source)}</div>
          <div class="card-name">${r.name || 'Untitled'}</div>
          ${r.description ? `<div class="card-desc">${r.description}</div>` : ''}
          <div class="card-footer">
            <span class="card-score">score <strong>${(r.final_score||0).toFixed(3)}</strong></span>
            ${r.embed_url ? `<span class="card-link">View 3D →</span>` : ''}
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  function cleanSource(s) {
    return (s || 'unknown').replace('metadata/', '').replace('_metadata.json', '').replace('.json', '');
  }
</script>
</body>
</html>
